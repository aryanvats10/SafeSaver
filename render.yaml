services:
  - type: web
    name: safe-saver
    env: node
    plan: free
    buildCommand: apt-get update && apt-get install -y ffmpeg python3-pip && pip3 install yt-dlp && npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    health:
      path: /health
      pollIntervalSeconds: 30
